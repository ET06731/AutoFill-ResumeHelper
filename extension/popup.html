<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AI Resume Autofill</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>AI Resume Autofill</h1>

      <div id="consent" class="card hidden">
        <h2>Privacy & Consent</h2>
        <p>
          This extension parses your resume locally, then calls Gemini to produce JSON Resume.
          Your data stays on your device unless you choose to export it.
        </p>
        <button id="accept-consent">I Agree</button>
      </div>

      <div id="main" class="card hidden">
        <label class="file-label">
          Upload PDF Resume
          <input type="file" id="resume-file" accept="application/pdf" />
        </label>
        <button id="parse-btn">Parse Resume</button>
        <div id="status" class="status"></div>
        <div class="actions">
          <button id="open-review">Review & Edit</button>
          <button id="open-manual">Manual Entry</button>
          <button id="clear-data">Clear Data</button>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
