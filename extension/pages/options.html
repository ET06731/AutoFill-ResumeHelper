<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mapping Rules</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <h1>Custom Mapping Rules</h1>
    <p>
      Provide key-to-selector mappings. Example:
      <code>{"email": "input[name='email']"}</code>
    </p>
    <textarea id="rules-text" spellcheck="false"></textarea>
    <div class="actions">
      <button id="save-btn">Save</button>
      <button id="reset-btn">Reset</button>
    </div>
    <div id="status" class="status"></div>
    <script src="options.js"></script>
  </body>
</html>
